<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biglietto del treno</title>
    <!-- Style CSS -->
    <link rel="stylesheet" href="./style.css">

    <!-- Javascript (usiamo defer per collegarlo nell'head del file html) -->
    <script src="./main.js" defer></script>
</head>

<body>
    <h1>Biglietto del Treno</h1>

    <form>
        <h3>Km</h3>
        <input type="number" id="km" placeholder="Km da percorrere" required/>
        <h3>Età</h3>
        <input type="number" id="age" placeholder="Età passeggero" required/>
        <button id="generateBtn" type="submit">Genera</button>
    </form>

    <section>
        <h2>Prezzo Finale</h2>
        <div id="finalRate"></div>
    </section>

</body>

</html>
